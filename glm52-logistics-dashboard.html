<style>
  :root { color-scheme: dark; }
  * { -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; height: 100%; background: #070f1f; overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; }

  /* Tech grid background */
  .bg-grid {
    background-color: #0a192f;
    background-image:
      radial-gradient(120% 90% at 50% 38%, rgba(56,189,248,0.10), transparent 55%),
      radial-gradient(80% 70% at 50% 120%, rgba(59,130,246,0.18), transparent 60%),
      linear-gradient(rgba(56,189,248,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.06) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 52px 52px, 52px 52px;
  }
  .bg-vignette::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 100% at 50% 45%, transparent 55%, rgba(3,7,16,0.75) 100%);
  }

  /* Glass surfaces */
  .glass {
    background: linear-gradient(180deg, rgba(16,42,71,0.66), rgba(10,25,47,0.55));
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(120,180,240,0.16);
    box-shadow: 0 18px 50px -20px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .glass-soft {
    background: rgba(13,31,56,0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(120,180,240,0.12);
  }

  .pill-hover { transition: transform .25s cubic-bezier(.2,.8,.2,1), background .25s, color .25s, border-color .25s; }
  .pill-hover:hover { transform: translateY(-1px); }

  /* Pulsing live dot */
  @keyframes pingsoft { 0%{transform:scale(1);opacity:.7} 70%,100%{transform:scale(2.6);opacity:0} }
  .live-dot::before {
    content:""; position:absolute; inset:0; border-radius:9999px;
    background:#10b981; animation: pingsoft 1.8s cubic-bezier(0,0,.2,1) infinite;
  }

  /* Shimmer for AI button */
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  .ai-shimmer {
    background-image: linear-gradient(100deg, transparent 20%, rgba(255,213,74,0.22) 50%, transparent 80%);
    background-size: 200% 100%; animation: shimmer 3s linear infinite;
  }

  /* Bottom panel slide */
  .panel-slide { transition: transform .55s cubic-bezier(.22,.65,.2,1), opacity .4s ease; }

  /* Custom scrollbars in light table */
  .nice-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .nice-scroll::-webkit-scrollbar-thumb { background: rgba(59,130,246,.35); border-radius: 8px; }
  .nice-scroll::-webkit-scrollbar-track { background: transparent; }

  /* Loading screen */
  @keyframes spin { to { transform: rotate(360deg) } }
  .spinner { animation: spin 1s linear infinite; }
  @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
  .hide-loader { animation: fadeOut .6s ease forwards; }

  .fade-in { animation: fadeIn .8s ease both; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  .grab { cursor: grab; }
  .grab:active { cursor: grabbing; }

  /* Range slider (risk gauge) */
  input[type=range].risk { -webkit-appearance:none; appearance:none; height:8px; border-radius:8px;
    background: linear-gradient(90deg,#10b981 0%,#10b981 var(--p,40%), rgba(255,255,255,.14) var(--p,40%)); }
  input[type=range].risk::-webkit-slider-thumb { -webkit-appearance:none; width:18px;height:18px;border-radius:50%;
    background:#fff; box-shadow:0 0 0 4px rgba(255,255,255,.18); cursor:pointer; }

  .text-glow { text-shadow: 0 0 24px rgba(56,189,248,.45); }
</style>

/* ───────────────────────── GEO HELPERS ───────────────────────── */

function latLngToVec3(lat, lng, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
     radius * Math.cos(phi),
     radius * Math.sin(phi) * Math.sin(theta)
  );
}

function makeGlowTexture(inner = 'rgba(255,255,255,1)', mid = 'rgba(150,220,255,0.55)', outer = 'rgba(56,189,248,0)') {
  const s = 128; const c = document.createElement('canvas'); c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0.0, inner);
  g.addColorStop(0.25, mid);
  g.addColorStop(1.0, outer);
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function makeLabelSprite(text, opts = {}) {
  const {
    dotColor = '#ffd54a',
    bg = 'rgba(255,255,255,0.95)',
    fg = '#0a192f',
    fontSize = 22,
    padX = 12, dotR = 5,
    scale = 0.0032,
  } = opts;
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  ctx.font = `700 ${fontSize}px Inter, system-ui, sans-serif`;
  const tw = Math.ceil(ctx.measureText(text).width);
  const w = tw + padX * 2 + dotR * 2 + 8;
  const h = fontSize + 18;
  const dpr = 3;
  c.width = w * dpr; c.height = h * dpr;
  c.style.width = `${w}px`; c.style.height = `${h}px`;
  ctx.scale(dpr, dpr);
  ctx.font = `700 ${fontSize}px Inter, system-ui, sans-serif`;
  // soft shadow
  ctx.shadowColor = 'rgba(0,0,0,0.34)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 2;
  roundRectPath(ctx, 0, 0, w, h, h / 2);
  ctx.fillStyle = bg; ctx.fill();
  ctx.shadowColor = 'transparent';
  // dot
  ctx.beginPath(); ctx.arc(padX + dotR, h / 2, dotR, 0, Math.PI * 2);
  ctx.fillStyle = dotColor; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(10,25,47,0.15)'; ctx.stroke();
  // text
  ctx.fillStyle = fg; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillText(text, padX + dotR * 2 + 8, h / 2 + 1);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 8;
  tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, alphaTest: 0.02, depthWrite: false, depthTest: true });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(w * scale, h * scale, 1);
  sp.userData.baseScale = sp.scale.clone();
  return sp;
}

/* ───────────────────────── GLOBE (Three.js) ───────────────────────── */

function Globe({ onReady, mode }) {
  const mountRef = useRef(null);
  const stateRef = useRef(null);

  useEffect(() => {
    const mount = mountRef.current;
    let renderer;
    try {
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
    } catch (e) {
      mount.innerHTML = '<div style="color:#fff;padding:40px">WebGL not available</div>';
      return;
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, mount.clientWidth / mount.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 6.2);

    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(mount.clientWidth, mount.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    mount.appendChild(renderer.domElement);
    renderer.domElement.classList.add('grab');

    /* ---- Stars ---- */
    const starGeo = new THREE.BufferGeometry();
    const starCount = 2600;
    const sPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 60 + Math.random() * 80;
      const t = Math.random() * Math.PI * 2;
      const p = Math.acos(2 * Math.random() - 1);
      sPos[i*3]   = r * Math.sin(p) * Math.cos(t);
      sPos[i*3+1] = r * Math.sin(p) * Math.sin(t);
      sPos[i*3+2] = r * Math.cos(p);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
      color: 0xcfe6ff, size: 0.18, sizeAttenuation: true, transparent: true, opacity: 0.85, depthWrite: false
    }));
    scene.add(stars);

    /* ---- Lights (for atmosphere/marker shading) ---- */
    scene.add(new THREE.AmbientLight(0x4060a0, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1.1);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    /* ---- Globe group (everything that rotates with the earth) ---- */
    const group = new THREE.Group();
    scene.add(group);
    const R = 2;
    const sunDir = new THREE.Vector3(5, 2.5, 4).normalize();

    const manager = new THREE.LoadingManager();
    const texLoader = new THREE.TextureLoader(manager);
    const baseUrl = 'https://cdn.jsdelivr.net/npm/three-globe@2.31.0/example/img/';
    const dayTex   = texLoader.load(baseUrl + 'earth-blue-marble.jpg');
    const nightTex = texLoader.load(baseUrl + 'earth-night.jpg');
    [dayTex, nightTex].forEach(t => { t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 8; });

    /* Earth: custom day/night shader */
    const earthMat = new THREE.ShaderMaterial({
      uniforms: {
        dayTex:   { value: dayTex },
        nightTex: { value: nightTex },
        uSun:     { value: sunDir.clone() },
      },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormalW;
        void main(){
          vUv = uv;
          vNormalW = normalize(mat3(modelMatrix) * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }`,
      fragmentShader: `
        uniform sampler2D dayTex;
        uniform sampler2D nightTex;
        uniform vec3 uSun;
        varying vec2 vUv;
        varying vec3 vNormalW;
        void main(){
          vec3 N = normalize(vNormalW);
          float d = dot(N, normalize(uSun));
          float dayAmt = smoothstep(-0.12, 0.28, d);
          vec3 day = texture2D(dayTex, vUv).rgb;
          vec3 night = texture2D(nightTex, vUv).rgb;
          // warm, bright city lights on the night side
          night = pow(night, vec3(1.1)) * vec3(1.5, 1.35, 1.0);
          vec3 col = mix(night, day, dayAmt);
          col += vec3(0.015, 0.02, 0.04); // subtle lift so the night side isn't pure black
          float term = 1.0 - abs(d);
          col += vec3(0.18, 0.42, 0.7) * smoothstep(0.7, 1.0, term) * 0.5; // atmosphere rim near terminator
          gl_FragColor = vec4(col, 1.0);
        }`,
    });

    const earth = new THREE.Mesh(new THREE.SphereGeometry(R, 96, 96), earthMat);
    group.add(earth);

    /* ---- Atmosphere (fresnel glow shell) ---- */
    const atmoMat = new THREE.ShaderMaterial({
      uniforms: { uColor: { value: new THREE.Color(0x3aa0ff) } },
      vertexShader: `
        varying vec3 vN;
        void main(){
          vN = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }`,
      fragmentShader: `
        uniform vec3 uColor;
        varying vec3 vN;
        void main(){
          float intensity = pow(0.62 - dot(vN, vec3(0.0,0.0,1.0)), 2.2);
          gl_FragColor = vec4(uColor, 1.0) * intensity;
        }`,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true,
      depthWrite: false,
    });
    const atmo = new THREE.Mesh(new THREE.SphereGeometry(R * 1.16, 64, 64), atmoMat);
    scene.add(atmo);

    /* ---- Markers + labels ---- */
    const glowTex = makeGlowTexture();
    const markers = [];

    function addMarker(item, prominent, opts = {}) {
      const { showLabel = prominent } = opts;
      const pos = latLngToVec3(item.lat, item.lng, R * 1.005);
      // glow
      const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: new THREE.Color(item.color), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
      glow.position.copy(pos); glow.scale.set(0.5, 0.5, 1);
      group.add(glow);
      // core dot
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(prominent ? 0.035 : 0.022, 16, 16),
        new THREE.MeshBasicMaterial({ color: item.color })
      );
      core.position.copy(pos); group.add(core);
      // thin beam
      const beamH = prominent ? 0.22 : 0.12;
      const beam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.006, 0.006, beamH, 8),
        new THREE.MeshBasicMaterial({ color: item.color, transparent: true, opacity: 0.6 })
      );
      beam.position.copy(pos.clone().multiplyScalar(1 + beamH/(2*R)));
      beam.lookAt(new THREE.Vector3(0,0,0));
      beam.rotateX(Math.PI/2);
      group.add(beam);

      let label = null;
      if (showLabel) {
        label = makeLabelSprite(item.code, {
          dotColor: item.color === '#ffffff' ? '#3b82f6' : item.color,
          bg: 'rgba(255,255,255,0.94)',
          fg: '#0a192f',
          fontSize: 18,
          padX: 10,
          dotR: 4,
          scale: 0.0028,
        });
        label.position.copy(pos.clone().multiplyScalar(1.09));
        group.add(label);
      }

      markers.push({ glow, core, label, pos: pos.clone(), prominent });
    }
    HUBS.forEach(h => addMarker(h, true, { showLabel: true }));
    VEHICLES.forEach(v => addMarker(v, false, { showLabel: false }));

    /* ---- Route arcs ---- */
    const arcs = [];
    ROUTES.forEach(r => {
      const a = latLngToVec3(r.a.lat, r.a.lng, R);
      const b = latLngToVec3(r.b.lat, r.b.lng, R);
      const dist = a.distanceTo(b);
      const mid = a.clone().add(b).multiplyScalar(0.5).normalize().multiplyScalar(R + Math.max(0.25, dist * 0.42));
      const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
      const tubeGeo = new THREE.TubeGeometry(curve, 60, r.primary ? 0.012 : 0.006, 8, false);
      const tubeMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(r.color),
        transparent: true, opacity: r.primary ? 0.95 : 0.55,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      group.add(tube);
      // moving particle
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(r.primary ? 0.03 : 0.02, 12, 12),
        new THREE.MeshBasicMaterial({ color: new THREE.Color(r.color) })
      );
      const headGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: new THREE.Color(r.color), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
      headGlow.scale.set(0.28, 0.28, 1);
      group.add(head); group.add(headGlow);
      arcs.push({ curve, head, headGlow, t: Math.random(), speed: 0.0028 + Math.random()*0.0016 });
    });

    /* ---- Interaction: drag rotation w/ inertia + damping ---- */
    const state = {
      dragging: false, px: 0, py: 0,
      velX: 0, velY: 0,
      targetX: 0.42, targetY: 0.38,
      rotX: 0.42, rotY: 0.38,
      lastInteract: performance.now(),
      targetDist: 6.2,
      curDist: 6.2,
    };
    stateRef.current = state;

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

    function onDown(e) {
      state.dragging = true;
      state.px = e.clientX; state.py = e.clientY;
      state.velX = 0; state.velY = 0;
      state.lastInteract = performance.now();
      renderer.domElement.setPointerCapture?.(e.pointerId);
    }
    function onMove(e) {
      if (!state.dragging) return;
      const dx = e.clientX - state.px;
      const dy = e.clientY - state.py;
      state.px = e.clientX; state.py = e.clientY;
      state.targetY += dx * 0.005;
      state.targetX = clamp(state.targetX + dy * 0.005, -1.15, 1.15);
      state.velY = dx * 0.005;
      state.velX = dy * 0.005;
      state.lastInteract = performance.now();
    }
    function onUp(e) {
      state.dragging = false;
      try { renderer.domElement.releasePointerCapture?.(e.pointerId); } catch(_) {}
    }
    function onWheel(e) {
      e.preventDefault();
      state.targetDist = clamp(state.targetDist + e.deltaY * 0.004, 3.6, 9.5);
      state.lastInteract = performance.now();
    }
    const dom = renderer.domElement;
    dom.addEventListener('pointerdown', onDown);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    dom.addEventListener('wheel', onWheel, { passive: false });

    /* ---- Expose controls ---- */
    const api = {
      zoomIn:  () => { state.targetDist = clamp(state.targetDist - 0.6, 3.6, 9.5); state.lastInteract = performance.now(); },
      zoomOut: () => { state.targetDist = clamp(state.targetDist + 0.6, 3.6, 9.5); state.lastInteract = performance.now(); },
      reset:   () => { state.targetDist = 6.2; state.targetX = 0.42; state.targetY = 0.38; state.lastInteract = performance.now(); },
      setMode: (m) => {
        if (m === '2d') { state.targetX = 0.0; state.targetY = 0.38; state.targetDist = 7.6; }
        else            { state.targetX = 0.42; state.targetY = 0.38; state.targetDist = 6.2; }
        state.lastInteract = performance.now();
      },
      onZoom:  (cb) => { api._cb = cb; },
    };
    state.__api = api;
    if (onReady) onReady(api);

    /* ---- Resize ---- */
    function onResize() {
      const w = mount.clientWidth, h = mount.clientHeight;
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    /* ---- Animation loop ---- */
    let raf;
    function tick() {
      raf = requestAnimationFrame(tick);
      const now = performance.now();
      const idle = now - state.lastInteract;

      if (!state.dragging) {
        // inertia
        state.targetY += state.velY;
        state.targetX = clamp(state.targetX + state.velX, -1.15, 1.15);
        state.velX *= 0.93; state.velY *= 0.93;
        // gentle auto-spin when idle
        if (idle > 2500 && Math.abs(state.velY) < 0.0005) state.targetY += 0.0009;
      }
      state.rotX += (state.targetX - state.rotX) * 0.1;
      state.rotY += (state.targetY - state.rotY) * 0.1;
      group.rotation.x = state.rotX;
      group.rotation.y = state.rotY;

      // zoom
      state.curDist += (state.targetDist - state.curDist) * 0.1;
      camera.position.z = state.curDist;
      if (api._cb) {
        const pct = clamp((9.5 - state.curDist) / (9.5 - 3.6) * 100, 4, 100);
        api._cb(pct);
      }

      // stars slow drift
      stars.rotation.y += 0.00015;

      // arc particles
      for (const a of arcs) {
        a.t += a.speed;
        if (a.t > 1) a.t = 0;
        const p = a.curve.getPointAt(a.t);
        a.head.position.copy(p);
        a.headGlow.position.copy(p);
      }
      // marker pulse
      const pulse = 0.5 + 0.5 * Math.sin(now * 0.003);
      for (const m of markers) {
        const s = m.prominent ? (0.42 + pulse * 0.18) : (0.30 + pulse * 0.12);
        m.glow.scale.set(s, s, 1);
      }

      renderer.render(scene, camera);
    }
    tick();

    // hide boot loader once first frame + textures ready
    manager.onLoad = () => {
      const el = document.getElementById('boot-loader');
      if (el) el.classList.add('hide-loader');
    };
    // also hide after a moment even if onLoad is slow
    setTimeout(() => {
      const el = document.getElementById('boot-loader');
      if (el && !el.classList.contains('hide-loader')) el.classList.add('hide-loader');
    }, 3500);

    /* ---- Cleanup ---- */
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      dom.removeEventListener('pointerdown', onDown);
      dom.removeEventListener('wheel', onWheel);
      renderer.dispose();
      if (dom.parentNode === mount) mount.removeChild(dom);
    };
  }, []); // mount once

  // respond to 3D/2D toggle (flatten tilt / pull back in 2D)
  useEffect(() => {
    stateRef.current?.__api?.setMode(mode);
  }, [mode]);

  return <div ref={mountRef} className="absolute inset-0 z-0" />;
}

/* ───────────────────────── APP ───────────────────────── */

function App() {
  const [controls, setControls] = useState(null);
  const [mode, setMode] = useState('3d');
  const [panelOpen, setPanelOpen] = useState(false);
  return (
    <div className="relative h-screen w-screen overflow-hidden bg-grid bg-vignette text-white select-none">
      <Globe onReady={setControls} mode={mode} />
      <Sidebar />
      <TopBar />
      <StatsPanel />
      <ZoomControls controls={controls} dimmed={panelOpen} />
      <ViewToggle mode={mode} setMode={setMode} dimmed={panelOpen} />
      <BottomPanel open={panelOpen} onToggle={() => setPanelOpen(o => !o)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
