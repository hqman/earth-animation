const ILayers  = (p) => <S {...p}><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></S>;
const ISliders = (p) => <S {...p}><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/><path d="M1 14h6M9 8h6M17 16h6"/></S>;
const ITruck   = (p) => <S {...p}><rect x="1" y="5" width="13" height="11" rx="1"/><path d="M14 9h4l3 3v4h-7z"/><circle cx="6" cy="18.5" r="1.8"/><circle cx="17.5" cy="18.5" r="1.8"/></S>;

const IPlane = ({ size = 18, className = "" }) => (

  </svg>
);
const ISpark = ({ size = 22, className = "" }) => (
  <svg viewBox="0 0 24 24" width={size} height={size} fill="currentColor" className={className}>
    <path d="M12 2l1.8 5.7L19.5 9.5l-5.7 1.8L12 17l-1.8-5.7L4.5 9.5l5.7-1.8L12 2z"/>
    <path d="M19.5 14.5l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9.9-2.6z" opacity=".85"/>
  </svg>
);

/* ============================== Globe data ============================== */
const R = 1;
function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}
function arcPoints(a, b, alt = 0.22, n = 160) {
  const va = latLonToVec3(a.lat, a.lon, 1);
  const vb = latLonToVec3(b.lat, b.lon, 1);
  const angle = va.angleTo(vb), sinA = Math.sin(angle);
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const p = va.clone().multiplyScalar(Math.sin((1 - t) * angle) / sinA)
      .add(vb.clone().multiplyScalar(Math.sin(t * angle) / sinA));
    pts.push(p.normalize().multiplyScalar(R * (1 + alt * Math.pow(Math.sin(Math.PI * t), 0.9))));
  }
  return pts;
}

const ROUTE = { from: { lat: 36.2, lon: -115.2 }, to: { lat: 4.6, lon: -74.1 }, alt: 0.22, split: 0.55 };

/* ============================== Three.js globe ============================== */
function useGlobe(mountRef, markerRefs, coordRef, apiRef) {
  useEffect(() => {
    const mount = mountRef.current;
    const readSize = () => ({
      W: mount.clientWidth || Math.max(320, window.innerWidth - 84),
      H: mount.clientHeight || window.innerHeight,
    });
    let { W, H } = readSize();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W, H);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    mount.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, W / H, 0.1, 100);
    camera.position.set(0, 0, 5.4);                 // intro: fly in

    const globe = new THREE.Group();
    globe.position.y = -0.18;
    globe.scale.setScalar(1.34);
    scene.add(globe);

    /* --- Earth --- */
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    const tex = (url, srgb) => {
      const t = loader.load(url);
      if (srgb) t.encoding = THREE.sRGBEncoding;
      t.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return t;
    };
    const dayMap   = tex("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg", true);
    const nightMap = tex("https://unpkg.com/three-globe/example/img/earth-night.jpg", true);
    const bumpMap  = tex("https://unpkg.com/three-globe/example/img/earth-topology.png", false);
    const waterMap = tex("https://unpkg.com/three-globe/example/img/earth-water.png", false);

    const earthMat = new THREE.MeshPhongMaterial({
      map: dayMap,
      color: new THREE.Color("#7d91ff"),          // bright deep-blue tint over blue marble
      emissiveMap: nightMap,
      emissive: new THREE.Color("#ffb45e"),       // golden city lights
      emissiveIntensity: 1.9,
      bumpMap, bumpScale: 0.045,
      specularMap: waterMap,
      specular: new THREE.Color("#2e4a8f"),
      shininess: 22,
    });
    const earth = new THREE.Mesh(new THREE.SphereGeometry(R, 96, 96), earthMat);
    globe.add(earth);

    // Additive city-light layer keeps the globe readable even in the dark UI,
    // matching the golden Black Marble look from the reference.
    const cityLights = new THREE.Mesh(
      new THREE.SphereGeometry(R * 1.006, 96, 96),
      new THREE.MeshBasicMaterial({
        map: nightMap,
        color: new THREE.Color("#ffd08a"),
        transparent: true,
        opacity: 1,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      })
    );
    globe.add(cityLights);

    /* --- Atmosphere (outer back-side glow) --- */
    const atmoMat = new THREE.ShaderMaterial({
      uniforms: {},
      vertexShader: `varying vec3 vN; void main(){ vN = normalize(normalMatrix * normal); gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `varying vec3 vN; void main(){ float i = pow(0.74 - dot(vN, vec3(0.,0.,1.)), 5.0); gl_FragColor = vec4(0.27,0.47,1.0,1.0) * i * 1.35; }`,
      blending: THREE.AdditiveBlending, side: THREE.BackSide, transparent: true, depthWrite: false,
    });
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(R * 1.34 * 1.16, 64, 64), atmoMat))
    scene.children[scene.children.length-1].position.y = globe.position.y;

    /* --- Inner fresnel rim --- */
    const rimMat = new THREE.ShaderMaterial({
      vertexShader: `varying vec3 vN; void main(){ vN = normalize(normalMatrix * normal); gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `varying vec3 vN; void main(){ float i = pow(1.0 - abs(dot(vN, vec3(0.,0.,1.))), 3.2); gl_FragColor = vec4(0.35,0.55,1.0,1.0) * i * 0.7; }`,
      blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,
    });
    globe.add(new THREE.Mesh(new THREE.SphereGeometry(R * 1.004, 96, 96), rimMat));

    /* --- Lights --- */
    scene.add(new THREE.AmbientLight(0x33406e, 1.25));
    const sun = new THREE.DirectionalLight(0xcfe0ff, 1.25);
    sun.position.set(-2.2, 1.6, 2.4);
    scene.add(sun);
    const fill = new THREE.PointLight(0x4e6bf5, 0.5, 12);
    fill.position.set(2.5, -1, 3);
    scene.add(fill);

    /* --- Stars --- */
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(1400 * 3);
    for (let i = 0; i < 1400; i++) {
      const u = Math.random() * 2 - 1;
      const th = Math.random() * Math.PI * 2;
      const s = Math.sqrt(1 - u * u);
      const d = 22 + Math.random() * 36;
      starPos.set([s * Math.cos(th) * d, u * d, s * Math.sin(th) * d], i * 3);
    }
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xbcd0ff, size: 0.05, transparent: true, opacity: 0.7, sizeAttenuation: true }));
    scene.add(stars);

    /* --- Main route: yellow → plane → white --- */
    const pts = arcPoints(ROUTE.from, ROUTE.to, ROUTE.alt, 180);
    const splitIdx = Math.round(pts.length * ROUTE.split);
    const tube = (points, color, radius) => new THREE.Mesh(
      new THREE.TubeGeometry(new THREE.CatmullRomCurve3(points), 96, radius, 8),
      new THREE.MeshBasicMaterial({ color })
    );
    globe.add(tube(pts.slice(0, splitIdx + 1), 0xffc83d, 0.0052));
    globe.add(tube(pts.slice(splitIdx), 0xffffff, 0.0042));
    // soft glow under the yellow segment
    const glowTube = tube(pts.slice(0, splitIdx + 1), 0xffc83d, 0.012);
    glowTube.material.transparent = true; glowTube.material.opacity = 0.18;
    globe.add(glowTube);

    /* --- Secondary faint routes with travelling pulses --- */
    const SECONDARY = [
      { a: { lat: 40.7, lon: -74 },  b: { lat: 51.5, lon: -0.1 },  alt: 0.3 },
      { a: { lat: 19.4, lon: -99.1 },b: { lat: -33.4, lon: -70.6 },alt: 0.22 },
      { a: { lat: 4.6, lon: -74.1 }, b: { lat: -23.5, lon: -46.6 },alt: 0.16 },
      { a: { lat: 36.2, lon: -115.2 },b:{ lat: 49.2, lon: -123.1 },alt: 0.1 },
    ];
    const pulses = [];
    SECONDARY.forEach((s, i) => {
      const p = arcPoints(s.a, s.b, s.alt, 120);
      const t = tube(p, 0x9db4ff, 0.0022);
      t.material.transparent = true; t.material.opacity = 0.32;
      globe.add(t);
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.011, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xcfe0ff, transparent: true, opacity: 0.95 })
      );
      globe.add(dot);
      pulses.push({ dot, pts: p, t: Math.random(), speed: 0.0016 + i * 0.0005 });
    });

    /* --- City marker dots on surface --- */
    [ROUTE.from, ROUTE.to].forEach((c, i) => {
      const d = new THREE.Mesh(
        new THREE.SphereGeometry(0.014, 16, 16),
        new THREE.MeshBasicMaterial({ color: i === 0 ? 0xffc83d : 0xffffff })
      );
      d.position.copy(latLonToVec3(c.lat, c.lon, R * 1.002));
      globe.add(d);
    });

    /* --- HTML marker anchors (local space) --- */
    const planePos = pts[splitIdx];
    const anchors = {
      usa:    latLonToVec3(ROUTE.from.lat, ROUTE.from.lon, R * 1.005),
      col:    latLonToVec3(ROUTE.to.lat, ROUTE.to.lon, R * 1.005),
      plane:  planePos.clone(),
      jl748:  latLonToVec3(43, -51, R * 1.06),
      mu131:  latLonToVec3(-9, -129, R * 1.05),
      ml356:  latLonToVec3(-13.5, -52, R * 1.05),
    };

    /* --- Interaction state --- */
    const st = {
      rotY: -0.18, rotX: 0.16, tRotY: -0.18, tRotX: 0.16,
      velY: 0, dragging: false, lastX: 0, lastY: 0, lastInteract: 0,
      tZoom: 3.05,
    };
    globe.rotation.set(st.rotX, st.rotY, 0);

    const el = renderer.domElement;
    el.style.cursor = "grab";
    const onDown = (e) => {
      st.dragging = true; st.velY = 0;
      st.lastX = e.clientX; st.lastY = e.clientY;
      st.lastInteract = performance.now();
      el.style.cursor = "grabbing";
      el.setPointerCapture && el.setPointerCapture(e.pointerId);
    };
    const onMove = (e) => {
      if (!st.dragging) return;
      const dx = e.clientX - st.lastX, dy = e.clientY - st.lastY;
      st.lastX = e.clientX; st.lastY = e.clientY;
      st.tRotY += dx * 0.0052;
      st.tRotX = THREE.MathUtils.clamp(st.tRotX + dy * 0.0032, -0.85, 0.95);
      st.velY = dx * 0.0052;
      st.lastInteract = performance.now();
    };
    const onUp = () => { st.dragging = false; el.style.cursor = "grab"; };
    const onWheel = (e) => {
      e.preventDefault();
      const normalizedDelta = Math.sign(e.deltaY) * Math.min(120, Math.abs(e.deltaY));
      st.tZoom = THREE.MathUtils.clamp(st.tZoom + normalizedDelta * 0.0065, 2.05, 22);
      st.lastInteract = performance.now();
    };
    el.addEventListener("pointerdown", onDown);
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    el.addEventListener("wheel", onWheel, { passive: false });

    apiRef.current = {
      zoom: (d) => { st.tZoom = THREE.MathUtils.clamp(st.tZoom + d, 2.05, 22); st.lastInteract = performance.now(); },
      reset: () => { st.tZoom = 3.05; st.tRotY = -0.18; st.tRotX = 0.16; st.lastInteract = performance.now(); },
    };

    /* --- Render loop --- */
    const wp = new THREE.Vector3(), nrm = new THREE.Vector3(), toCam = new THREE.Vector3();
    const globeCenter = new THREE.Vector3();
    let raf;
    const animate = () => {
      raf = requestAnimationFrame(animate);
      const now = performance.now();

      // inertia + idle auto-rotate
      if (!st.dragging) {
        st.tRotY += st.velY; st.velY *= 0.94;
        if (now - st.lastInteract > 3000) st.tRotY += 0.00045;
      }
      st.rotY += (st.tRotY - st.rotY) * 0.12;
      st.rotX += (st.tRotX - st.rotX) * 0.12;
      globe.rotation.y = st.rotY;
      globe.rotation.x = st.rotX;

      camera.position.z += (st.tZoom - camera.position.z) * 0.12;
      stars.rotation.y -= 0.00012;

      pulses.forEach((p) => {
        p.t = (p.t + p.speed) % 1;
        p.dot.position.copy(p.pts[Math.floor(p.t * (p.pts.length - 1))]);
        p.dot.material.opacity = 0.55 + 0.45 * Math.sin(p.t * Math.PI);
      });

      // project HTML markers
      globe.updateMatrixWorld();
      globe.getWorldPosition(globeCenter);
      for (const id in anchors) {
        const elm = markerRefs.current[id];
        if (!elm) continue;
        wp.copy(anchors[id]).applyMatrix4(globe.matrixWorld);
        nrm.copy(wp).sub(globeCenter).normalize();
        toCam.copy(camera.position).sub(wp).normalize();
        const facing = nrm.dot(toCam);
        const vis = THREE.MathUtils.clamp((facing - 0.04) / 0.22, 0, 1);
        wp.project(camera);
        const x = (wp.x * 0.5 + 0.5) * W;
        const y = (-wp.y * 0.5 + 0.5) * H;
        elm.style.transform = `translate3d(${x.toFixed(1)}px, ${y.toFixed(1)}px, 0)`;
        elm.style.opacity = vis.toFixed(2);
      }

      if (coordRef.current) {
        const lon = (((-st.rotY * 57.29578 - 90) % 360) + 540) % 360 - 180;
        const lat = st.rotX * 57.29578;
        coordRef.current.x.textContent = lat.toFixed(6);
        coordRef.current.y.textContent = lon.toFixed(6);
      }

      renderer.render(scene, camera);
    };
    animate();

    const onResize = () => {
      ({ W, H } = readSize());
      camera.aspect = W / H; camera.updateProjectionMatrix();
      renderer.setSize(W, H);
    };
    window.addEventListener("resize", onResize);
    requestAnimationFrame(onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", onResize);
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      el.removeEventListener("pointerdown", onDown);
      el.removeEventListener("wheel", onWheel);
      renderer.dispose();
      mount.removeChild(el);
    };
  }, []);
}
